name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: pip install ruff pytest boto3 moto psycopg[binary]
      - name: Lint
        run: ruff check src/ tests/
      - name: Unit tests
        run: pytest tests/ -q
      - name: Validate SAM template
        run: |
          pip install aws-sam-cli
          sam validate --template infra/template.yaml --lint --region us-east-1

  # P4: deploy job (sam build/deploy via OIDC role) + smoke `agentcore invoke`
